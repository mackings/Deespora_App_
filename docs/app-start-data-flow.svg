  <polygon points="250,362 242,348 258,348" fill="#2C5A46"/>
  <line x1="250" y1="488" x2="250" y2="540" stroke="#2C5A46" stroke-width="4" stroke-linecap="round"/>
  <polygon points="250,522 242,508 258,508" fill="#2C5A46"/>
  <line x1="250" y1="648" x2="250" y2="700" stroke="#2C5A46" stroke-width="4" stroke-linecap="round"/>
  <polygon points="250,682 242,668 258,668" fill="#2C5A46"/>
  <line x1="250" y1="808" x2="250" y2="860" stroke="#2C5A46" stroke-width="4" stroke-linecap="round"/>
  <polygon points="250,842 242,828 258,828" fill="#2C5A46"/>
  <line x1="320" y1="808" x2="320" y2="860" stroke="#2C5A46" stroke-width="4" stroke-linecap="round"/>
  <polygon points="320,842 312,828 328,828" fill="#2C5A46"/>

  <line x1="400" y1="284" x2="450" y2="284" stroke="#0F4C5C" stroke-width="4" stroke-linecap="round"/>
  <polygon points="432,292 446,284 432,276" fill="#0F4C5C"/>
  <line x1="585" y1="328" x2="1020" y2="240" stroke="#0F4C5C" stroke-width="4" stroke-linecap="round"/>
  <polygon points="999,252 1016,241 996,236" fill="#0F4C5C"/>

  <line x1="1020" y1="348" x2="1020" y2="390" stroke="#2B6E99" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1020,372 1012,358 1028,358" fill="#2B6E99"/>
  <line x1="1170" y1="455" x2="1210" y2="455" stroke="#2B6E99" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1192,463 1206,455 1192,447" fill="#2B6E99"/>
  <line x1="1020" y1="520" x2="1020" y2="570" stroke="#2B6E99" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1020,552 1012,538 1028,538" fill="#2B6E99"/>
  <line x1="1180" y1="650" x2="1180" y2="780" stroke="#2B6E99" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1180,762 1172,748 1188,748" fill="#2B6E99"/>
  <line x1="1170" y1="851" x2="1190" y2="851" stroke="#2B6E99" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1172,859 1186,851 1172,843" fill="#2B6E99"/>
  <line x1="1340" y1="922" x2="1340" y2="970" stroke="#2B6E99" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1340,952 1332,938 1348,938" fill="#2B6E99"/>
</svg>
